<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a LearnFlow account to start applying for programs">
    <title>Register - LearnFlow</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <div class="logo-icon">🎓</div>LearnFlow
            </a>
            <ul class="nav-links" id="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/programs">Programs</a></li>
                <li><a href="/recommendations">AI Recommendations</a></li>
            </ul>
            <div class="nav-auth" id="nav-auth"></div>
            <div class="nav-toggle" onclick="document.getElementById('nav-links').classList.toggle('mobile-open')">
                <span></span><span></span><span></span></div>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card">
            <div class="text-center mb-3">
                <a href="/" style="font-size:2.5rem; text-decoration:none;">🎓</a>
            </div>
            <h1>Get Started</h1>
            <p class="auth-subtitle">Create your LearnFlow account</p>
            <form id="register-form">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-input" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone (optional)</label>
                    <input type="tel" class="form-input" id="phone" placeholder="+1 (555) 000-0000">
                </div>
                <div class="form-group">
                    <label class="form-label">Role</label>
                    <select class="form-select" id="role">
                        <option value="student">Student</option>
                        <option value="counselor">Counselor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Min. 6 characters"
                        minlength="6" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-input" id="confirm-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block mt-2" id="register-submit-btn">Create
                    Account</button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="/login">Sign in</a>
            </div>
        </div>
    </div>
    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
</body>

</html>
