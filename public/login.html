<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to your LearnFlow account">
    <title>Sign In - LearnFlow</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <div class="logo-icon">🎓</div>LearnFlow
            </a>
            <ul class="nav-links" id="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/programs">Programs</a></li>
                <li><a href="/recommendations">AI Recommendations</a></li>
            </ul>
            <div class="nav-auth" id="nav-auth"></div>
            <div class="nav-toggle" onclick="document.getElementById('nav-links').classList.toggle('mobile-open')">
                <span></span><span></span><span></span></div>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card">
            <div class="text-center mb-3">
                <a href="/" style="font-size:2.5rem; text-decoration:none;">🎓</a>
            </div>
            <h1>Welcome Back</h1>
            <p class="auth-subtitle">Sign in to your LearnFlow account</p>
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block mt-2" id="login-submit-btn">Sign
                    In</button>
            </form>
            <div class="divider">or</div>
            <div
                style="background:var(--bg-input);border-radius:var(--radius-md);padding:1rem;font-size:0.85rem;color:var(--text-secondary);">
                <p style="margin-bottom:0.5rem;font-weight:600;color:var(--text-primary);">Demo Accounts:</p>
                <p>Student: <strong>student@learnflow.com</strong> / student123</p>
                <p>Counselor: <strong>counselor@learnflow.com</strong> / counselor123</p>
            </div>
            <div class="auth-footer">
                Don't have an account? <a href="/register">Create one</a>
            </div>
        </div>
    </div>
    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
</body>

</html>
